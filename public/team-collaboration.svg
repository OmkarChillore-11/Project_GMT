<svg width="700" height="500" viewBox="0 0 700 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="teamGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03499e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="500" fill="#f8f9fa"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#03499e" opacity="0.1"/>
  <circle cx="600" cy="400" r="80" fill="#00b4d8" opacity="0.1"/>
  
  <!-- Conference table -->
  <ellipse cx="350" cy="350" rx="250" ry="80" fill="#03499e" opacity="0.2"/>
  
  <!-- Person 1 (Left) -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="35" fill="url(#teamGrad1)"/>
    <rect x="-30" y="40" width="60" height="80" rx="30" fill="#03499e" opacity="0.8"/>
    <ellipse cx="0" cy="140" rx="40" ry="10" fill="#03499e" opacity="0.3"/>
  </g>
  
  <!-- Person 2 (Center) -->
  <g transform="translate(350, 180)">
    <circle cx="0" cy="0" r="40" fill="url(#teamGrad1)"/>
    <rect x="-35" y="45" width="70" height="90" rx="35" fill="#0066cc" opacity="0.8"/>
    <ellipse cx="0" cy="155" rx="45" ry="12" fill="#0066cc" opacity="0.3"/>
  </g>
  
  <!-- Person 3 (Right) -->
  <g transform="translate(550, 200)">
    <circle cx="0" cy="0" r="35" fill="url(#teamGrad1)"/>
    <rect x="-30" y="40" width="60" height="80" rx="30" fill="#00b4d8" opacity="0.8"/>
    <ellipse cx="0" cy="140" rx="40" ry="10" fill="#00b4d8" opacity="0.3"/>
  </g>
  
  <!-- Laptop in center -->
  <g transform="translate(300, 320)">
    <rect x="0" y="0" width="100" height="60" rx="5" fill="#2c3e50"/>
    <rect x="5" y="5" width="90" height="50" fill="#3498db"/>
    <rect x="40" y="60" width="20" height="5" fill="#2c3e50"/>
    <rect x="20" y="65" width="60" height="3" rx="1.5" fill="#2c3e50"/>
  </g>
  
  <!-- Documents -->
  <g transform="translate(480, 340)">
    <rect x="0" y="0" width="60" height="70" rx="3" fill="white" stroke="#03499e" stroke-width="2"/>
    <line x1="10" y1="15" x2="50" y2="15" stroke="#03499e" stroke-width="2"/>
    <line x1="10" y1="25" x2="50" y2="25" stroke="#03499e" stroke-width="1.5"/>
    <line x1="10" y1="35" x2="40" y2="35" stroke="#03499e" stroke-width="1.5"/>
  </g>
  
  <!-- Coffee cup -->
  <g transform="translate(160, 340)">
    <rect x="0" y="10" width="30" height="35" rx="3" fill="white" stroke="#03499e" stroke-width="2"/>
    <ellipse cx="15" cy="10" rx="15" ry="5" fill="#03499e" opacity="0.3"/>
    <path d="M 30 20 Q 40 20 40 30 Q 40 40 30 40" stroke="#03499e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Idea bulb -->
  <g transform="translate(350, 80)">
    <circle cx="0" cy="0" r="25" fill="#ffd700" opacity="0.8"/>
    <rect x="-8" y="25" width="16" height="15" rx="3" fill="#03499e" opacity="0.6"/>
    <line x1="-35" y1="0" x2="-45" y2="0" stroke="#ffd700" stroke-width="3"/>
    <line x1="35" y1="0" x2="45" y2="0" stroke="#ffd700" stroke-width="3"/>
    <line x1="0" y1="-35" x2="0" y2="-45" stroke="#ffd700" stroke-width="3"/>
    <line x1="-25" y1="-25" x2="-32" y2="-32" stroke="#ffd700" stroke-width="3"/>
    <line x1="25" y1="-25" x2="32" y2="-32" stroke="#ffd700" stroke-width="3"/>
  </g>
  
  <!-- Connection lines between people -->
  <line x1="185" y1="240" x2="315" y2="220" stroke="#03499e" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
  <line x1="385" y1="220" x2="515" y2="240" stroke="#03499e" stroke-width="2" stroke-dasharray="5,5" opacity="0.4"/>
</svg>

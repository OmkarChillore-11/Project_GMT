<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03499e;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#03499e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circles -->
  <circle cx="650" cy="150" r="120" fill="url(#grad1)" />
  <circle cx="150" cy="450" r="100" fill="url(#grad1)" />
  
  <!-- Main illustration - Business dashboard -->
  <rect x="150" y="100" width="500" height="400" rx="20" fill="white" stroke="#03499e" stroke-width="2" opacity="0.9"/>
  
  <!-- Dashboard header -->
  <rect x="150" y="100" width="500" height="60" rx="20" fill="url(#grad2)" />
  <circle cx="190" cy="130" r="8" fill="white" opacity="0.8"/>
  <circle cx="215" cy="130" r="8" fill="white" opacity="0.8"/>
  <circle cx="240" cy="130" r="8" fill="white" opacity="0.8"/>
  
  <!-- Chart bars -->
  <rect x="200" y="250" width="60" height="150" rx="8" fill="#03499e" opacity="0.7"/>
  <rect x="290" y="200" width="60" height="200" rx="8" fill="#0066cc" opacity="0.7"/>
  <rect x="380" y="220" width="60" height="180" rx="8" fill="#00b4d8" opacity="0.7"/>
  <rect x="470" y="180" width="60" height="220" rx="8" fill="#03499e" opacity="0.7"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="200" r="40" fill="#03499e" opacity="0.2"/>
  <circle cx="700" cy="400" r="50" fill="#00b4d8" opacity="0.2"/>
  
  <!-- Data points -->
  <circle cx="230" cy="240" r="6" fill="#03499e"/>
  <circle cx="320" cy="190" r="6" fill="#0066cc"/>
  <circle cx="410" cy="210" r="6" fill="#00b4d8"/>
  <circle cx="500" cy="170" r="6" fill="#03499e"/>
  
  <!-- Connecting lines -->
  <line x1="230" y1="240" x2="320" y2="190" stroke="#03499e" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="190" x2="410" y2="210" stroke="#03499e" stroke-width="2" opacity="0.5"/>
  <line x1="410" y1="210" x2="500" y2="170" stroke="#03499e" stroke-width="2" opacity="0.5"/>
</svg>
